name: Build Signed Release APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install unzip
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip

      - name: Extract Project ZIP
        shell: bash
        run: |
          unzip -o socialscienceapp.zip
          shopt -s dotglob
          mv socialscienceapp-main/* .
          rm -rf socialscienceapp-main

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle Executable
        run: chmod +x gradlew

      - name: Generate Debug Keystore
        shell: bash
        run: |
          mkdir -p ~/.android

          keytool -genkeypair \
            -v \
            -storetype PKCS12 \
            -keystore ~/.android/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace --warning-mode all

      - name: Sign APK
        shell: bash
        run: |
          ZIPALIGN=$(find "$ANDROID_HOME/build-tools" -name zipalign | sort | tail -1)
          APKSIGNER=$(find "$ANDROID_HOME/build-tools" -name apksigner | sort | tail -1)

          mkdir -p signed

          $ZIPALIGN -f -p 4 \
            app/build/outputs/apk/release/app-release-unsigned.apk \
            signed/app-release-aligned.apk

          $APKSIGNER sign \
            --ks ~/.android/debug.keystore \
            --ks-pass pass:android \
            --key-pass pass:android \
            --ks-key-alias androiddebugkey \
            --out signed/app-release.apk \
            signed/app-release-aligned.apk

      - name: Verify APK
        shell: bash
        run: |
          APKSIGNER=$(find "$ANDROID_HOME/build-tools" -name apksigner | sort | tail -1)
          $APKSIGNER verify signed/app-release.apk

      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: signed-release-apk
          path: signed/app-release.apk
          if-no-files-found: error

      - name: Upload Build Logs (Always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-logs
          path: |
            **/build/reports/**
            **/build/outputs/logs/**
            **/*.log
